<!doctype html>

<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Chat - Usuário</title>

<style>
:root{
  --bg:#0b1220; --card:#0f1b33; --text:#e7eefc;
  --me:#2b6cff; --bot:#1d2a48;
}
body{margin:0;font-family:system-ui;background:#0b1220;color:#fff}
.wrap{max-width:900px;margin:auto;padding:20px}
.card{background:#0f1b33;border-radius:12px;overflow:hidden}
.chat{height:70vh;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.msg{padding:10px;border-radius:10px;max-width:80%}
.me{background:#2b6cff;align-self:flex-end}
.bot{background:#1d2a48}
.bar{display:flex;padding:10px;gap:10px}
input{flex:1;padding:10px}
button{padding:10px;cursor:pointer}
img.preview{max-width:200px;border-radius:10px;margin-top:5px}
.menu-box{background:#1d2a48;padding:10px;border-radius:10px}
.menu-btn{margin:5px 0;padding:8px;border:none;border-radius:8px;background:#2b6cff;color:#fff;cursor:pointer}
.upload-box{background:#2a2a00;padding:10px;border-radius:10px}
</style>

</head>

<body>
<div class="wrap">
<div class="card">
<div id="chat" class="chat"></div>

<div class="bar">
<input id="text" placeholder="Digite..." />
<input id="fileInput" type="file" multiple accept="image/*,.pdf" hidden />
<button id="attachBtn">Anexar</button>
<button id="send">Enviar</button>
</div>
</div>
</div>

<script>
const API_BASE = "https://chatbot.pedro-fillype.workers.dev";

const $chat = document.getElementById("chat");
const $text = document.getElementById("text");
const $send = document.getElementById("send");
const $fileInput = document.getElementById("fileInput");
const $attachBtn = document.getElementById("attachBtn");

const ticket = {
  flow: null,
  attachments: [],
  criacaoOS: {},
  aberturaChamado: {}
};

/* ================= UI ================= */
function addMsg(type, text){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  $chat.appendChild(div);
  $chat.scrollTop = $chat.scrollHeight;
}

function addImage(url){
  const div = document.createElement("div");
  div.className = "msg bot";

  const img = document.createElement("img");
  img.src = url;
  img.className = "preview";

  div.appendChild(img);
  $chat.appendChild(div);
  $chat.scrollTop = $chat.scrollHeight;
}

function addMenu(title, options){
  const box = document.createElement("div");
  box.className = "menu-box";

  box.innerHTML = `<div>${title}</div>`;

  options.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className = "menu-btn";
    btn.innerText = opt.label;
    btn.onclick = ()=> handleMenu(opt.value, opt.label);
    box.appendChild(btn);
  });

  $chat.appendChild(box);
  $chat.scrollTop = $chat.scrollHeight;
}

function addUploadPrompt(){
  const div = document.createElement("div");
  div.className = "upload-box";
  div.innerText = "📎 Clique em ANEXAR para enviar imagens ou PDF";
  $chat.appendChild(div);
}

/* ================= UPLOAD ================= */
async function handleSelectedFiles(files){
  const list = Array.from(files || []);
  if(!list.length) return;

  for(const file of list){

    addMsg("bot","📎 Enviando arquivo...");

    const form = new FormData();
    form.append("file", file);

    try{
      const resp = await fetch(API_BASE + "/upload", {
        method: "POST",
        body: form
      });

      const data = await resp.json();
      console.log("UPLOAD:", data);

      if (!data.ok || !data.url) {
        addMsg("bot","❌ Erro no upload");
        return;
      }

      ticket.attachments.push({
        name:file.name,
        url:data.url
      });

      addMsg("me","📎 "+file.name);

      if(file.type.startsWith("image/")){
        addImage(data.url);
      }

    }catch(e){
      addMsg("bot","Erro ao enviar arquivo");
    }
  }

  $fileInput.value = "";
}

/* ================= MENU ================= */
function handleMenu(value, label){
  addMsg("me", label);

  if(value === "criacao_os"){
    ticket.flow = "criacao_os";
    addMsg("bot","Qual o motivo da solicitação?");
  }

  if(value === "abertura_chamado"){
    ticket.flow = "abertura_chamado";
    addMsg("bot","Informe a matrícula:");
  }
}

/* ================= ENVIO ================= */
function send(){
  const txt = $text.value.trim();
  if(!txt) return;

  addMsg("me", txt);
  $text.value = "";

  if(txt.toLowerCase() === "menu"){
    start();
    return;
  }

  if(ticket.flow){
    addMsg("bot","Continue preenchendo ou envie anexos.");
  }
}

/* ================= INIT ================= */
function start(){
  addMsg("bot","Escolha uma opção:");
  addMenu("Menu:",[
    {value:"criacao_os", label:"1 - Criação de OS"},
    {value:"abertura_chamado", label:"2 - Abertura de Chamado"}
  ]);
}

/* ================= EVENTS ================= */
$attachBtn.onclick = ()=> $fileInput.click();
$fileInput.onchange = (e)=> handleSelectedFiles(e.target.files);
$send.onclick = send;
$text.onkeydown = (e)=> e.key==="Enter" && send();

start();
</script>

</body>
</html>
