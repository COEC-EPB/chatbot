<!doctype html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chat Inteligente</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  display:flex;
  justify-content:center;
}

.wrap{
  width:100%;
  max-width:600px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:10px 14px;
  border-radius:12px;
  max-width:75%;
  animation:fade .2s ease;
}

.me{
  background:#2b6cff;
  align-self:flex-end;
}

.bot{
  background:#1d2a48;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.menu button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2b6cff;
  color:#fff;
  cursor:pointer;
}

.bar{
  display:flex;
  gap:10px;
  padding:10px;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#2b6cff;
  color:#fff;
}

img{
  max-width:200px;
  border-radius:10px;
}

@keyframes fade{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1;}
}
</style>

</head>

<body>
<div class="wrap">
<div id="chat" class="chat"></div>

<div class="bar">
<input id="text" placeholder="Digite..." />
<input id="fileInput" type="file" hidden multiple />
<button onclick="fileInput.click()">📎</button>
<button onclick="send()">➤</button>
</div>
</div>

<script>
const API = "https://chatbot.pedro-fillype.workers.dev";

const chat = document.getElementById("chat");
const input = document.getElementById("text");
const fileInput = document.getElementById("fileInput");

let state = null;

const ticket = {
  chamado:{},
  attachments:[]
};

/* UI */
function msg(type,text){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function img(url){
  const d=document.createElement("div");
  d.className="msg bot";
  d.innerHTML=`<img src="${url}"/>`;
  chat.appendChild(d);
}

/* limpa menus antigos */
function clearMenus(){
  document.querySelectorAll(".menu").forEach(e=>e.remove());
}

/* MENU */
function showMenu(options){
  clearMenus();

  const box=document.createElement("div");
  box.className="menu";

  options.forEach(([val,label])=>{
    const b=document.createElement("button");
    b.innerText=label;
    b.onclick=()=>menuClick(val,label);
    box.appendChild(b);
  });

  chat.appendChild(box);
}

/* INICIO */
function start(){
  msg("bot","👋 Olá! Escolha uma opção:");

  showMenu([
    ["chamado","📞 Abertura de Chamado"],
    ["os","📋 Criação de OS"]
  ]);
}

/* MENU CLICK */
function menuClick(val,label){
  msg("me",label);

  if(val==="chamado"){
    state="matricula";
    msg("bot","Informe a matrícula:");
    return;
  }

  if(val==="reembolso"){
    showMenu([
      ["bolsa","Bolsa de Estudos"],
      ["baba","Auxílio Babá"],
      ["creche","Creche"]
    ]);
    return;
  }

  if(val==="bolsa"){
    ticket.chamado.tipo="bolsa";
    state="valor";
    msg("bot","Valor do reembolso:");
    return;
  }
}

/* INPUT */
function send(){
  const v=input.value.trim();
  if(!v) return;

  msg("me",v);
  input.value="";
  input.focus(); // 🔥 continua digitando

  if(state==="matricula"){
    ticket.chamado.matricula=v;
    state="telefone";
    msg("bot","Telefone:");
    return;
  }

  if(state==="telefone"){
    ticket.chamado.telefone=v;
    showMenu([["reembolso","Reembolso"]]);
    return;
  }

  if(state==="valor"){
    ticket.chamado.valor=v;
    msg("bot","📎 Envie os documentos");
    state="upload";
    return;
  }
}

/* UPLOAD */
fileInput.onchange=async e=>{
  const files=[...e.target.files];

  for(const file of files){

    msg("bot","📎 Enviando...");

    const form=new FormData();
    form.append("file",file);

    const res=await fetch(API+"/upload",{method:"POST",body:form});
    const data=await res.json();

    if(!data.ok) continue;

    ticket.attachments.push(data.url);

    msg("me","📎 "+file.name);

    if(file.type.startsWith("image/")){
      img(data.url);
    }
  }

  if(state==="upload") finish();
};

/* FINAL */
function finish(){

  let txt = "📋 Novo Atendimento\n\n";

  const a = ticket.chamado;

  txt += `Matrícula: ${a.matricula}\n`;
  txt += `Telefone: ${a.telefone}\n`;
  txt += `Tipo: ${a.tipo}\n`;

  if(a.valor){
    txt += `Valor: ${a.valor}\n`;
  }

  if(ticket.attachments.length){
    txt += "\n📎 Anexos:\n";
    txt += ticket.attachments.join("\n");
  }

  if(a.telefone){
    const tel = a.telefone.replace(/\D/g,"");
    txt += `\n📲 Cliente:\nhttps://wa.me/55${tel}\n`;
  }

  const encoded = encodeURIComponent(txt);
  const telefoneAtendente = "5583991188662";

  const url = `https://wa.me/${telefoneAtendente}?text=${encoded}`;

  msg("bot","✅ Tudo pronto!");

  // 🔥 BOTÃO (MELHOR UX)
  const btn = document.createElement("button");
  btn.innerText = "📲 Abrir WhatsApp";
  btn.style.marginTop = "10px";
  btn.onclick = () => window.open(url, "_blank");

  chat.appendChild(btn);
}
  document.getElementById("text").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
    this.focus(); // mantém digitando direto
  }
});

/* INIT */
start();
</script>

</body>
</html>
