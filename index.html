<!doctype html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Atendimento Energisa</title>

<style>
:root{
  --azul:#0b2a6f;
  --azul2:#123c9b;
  --amarelo:#ffd400;
  --bg:#f4f6fb;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  display:flex;
  justify-content:center;
}

.wrap{
  width:100%;
  max-width:600px;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:#fff;
}

.header{
  background:var(--azul);
  color:#fff;
  padding:15px;
  font-weight:bold;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:10px 14px;
  border-radius:14px;
  max-width:75%;
  animation:fade .2s ease;
}

.me{
  background:var(--azul2);
  color:#fff;
  align-self:flex-end;
}

.bot{
  background:#e9eefc;
  color:#000;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.menu button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--azul2);
  color:#fff;
  cursor:pointer;
}

.bar{
  display:flex;
  gap:10px;
  padding:10px;
  border-top:1px solid #ddd;
  background:#fff;
}

input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:1px solid #ccc;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:var(--azul2);
  color:#fff;
  cursor:pointer;
}

.whats-btn{
  background:var(--amarelo);
  color:#000;
  font-weight:bold;
}

img{
  max-width:200px;
  border-radius:10px;
}

@keyframes fade{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1;}
}
</style>

</head>

<body>
<div class="wrap">

<div class="header">⚡ Atendimento Energisa</div>

<div id="chat" class="chat"></div>

<div class="bar">
<input id="text" placeholder="Digite sua mensagem..." />
<input id="fileInput" type="file" hidden multiple />
<button onclick="fileInput.click()">📎</button>
<button onclick="send()">➤</button>
</div>

</div>

<script>
const API = "https://chatbot.pedro-fillype.workers.dev";

const chat = document.getElementById("chat");
const input = document.getElementById("text");
const fileInput = document.getElementById("fileInput");

let state=null;

const ticket={
  chamado:{},
  attachments:[]
};

/* UI */
function msg(type,text){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function img(url){
  const d=document.createElement("div");
  d.className="msg bot";
  d.innerHTML=`<img src="${url}">`;
  chat.appendChild(d);
}

/* limpa menus */
function clearMenus(){
  document.querySelectorAll(".menu").forEach(e=>e.remove());
}

/* menu */
function showMenu(opts){
  clearMenus();

  const box=document.createElement("div");
  box.className="menu";

  opts.forEach(([val,label])=>{
    const b=document.createElement("button");
    b.innerText=label;
    b.onclick=()=>menuClick(val,label);
    box.appendChild(b);
  });

  chat.appendChild(box);
}

/* start */
function start(){
  msg("bot","Olá! Como posso ajudar?");
  showMenu([
    ["chamado","📞 Abertura de Chamado"],
    ["os","📋 Criação de OS"]
  ]);
}

/* menu click */
function menuClick(val,label){
  msg("me",label);

  if(val==="chamado"){
    state="matricula";
    msg("bot","Informe a matrícula:");
    return;
  }

  if(val==="reembolso"){
    showMenu([
      ["bolsa","Bolsa de Estudos"],
      ["baba","Auxílio Babá"],
      ["creche","Creche"]
    ]);
    return;
  }

  if(val==="bolsa"){
    ticket.chamado.tipo="bolsa";
    state="valor";
    msg("bot","Valor do reembolso:");
    return;
  }
}

/* envio */
function send(){
  const v=input.value.trim();
  if(!v) return;

  msg("me",v);
  input.value="";
  input.focus(); // 🔥 mantém ativo

  if(state==="matricula"){
    ticket.chamado.matricula=v;
    state="telefone";
    msg("bot","Telefone:");
    return;
  }

  if(state==="telefone"){
    ticket.chamado.telefone=v;
    showMenu([["reembolso","Reembolso"]]);
    return;
  }

  if(state==="valor"){
    ticket.chamado.valor=v;
    msg("bot","📎 Envie os documentos");
    state="upload";
    return;
  }
}

/* ENTER FUNCIONANDO */
input.addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

/* upload */
fileInput.onchange=async e=>{
  const files=[...e.target.files];

  for(const file of files){

    msg("bot","📎 Enviando...");

    const form=new FormData();
    form.append("file",file);

    const res=await fetch(API+"/upload",{method:"POST",body:form});
    const data=await res.json();

    if(!data.ok) continue;

    ticket.attachments.push(data.url);

    msg("me","📎 "+file.name);

    if(file.type.startsWith("image/")){
      img(data.url);
    }
  }

  if(state==="upload") finish();
};

/* final */
function finish(){

  let txt="📋 Novo Atendimento\n\n";

  const a=ticket.chamado;

  txt+=`Matrícula: ${a.matricula}\n`;
  txt+=`Telefone: ${a.telefone}\n`;
  txt+=`Tipo: ${a.tipo}\n`;
  txt+=`Valor: ${a.valor}\n`;

  if(ticket.attachments.length){
    txt+="\n📎 Anexos:\n"+ticket.attachments.join("\n");
  }

  const url=`https://wa.me/5583991188662?text=${encodeURIComponent(txt)}`;

  msg("bot","Tudo pronto! 👇");

  const btn=document.createElement("button");
  btn.className="whats-btn";
  btn.innerText="📲 Abrir WhatsApp";
  btn.onclick=()=>window.open(url,"_blank");

  chat.appendChild(btn);
}

/* init */
start();
input.focus();
</script>

</body>
</html>
