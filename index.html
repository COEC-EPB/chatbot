<!doctype html>

<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Chat - Usuário</title>

<style>
:root{
  --bg:#0b1220; --card:#0f1b33; --text:#e7eefc;
  --me:#2b6cff; --bot:#1d2a48;
}
body{margin:0;font-family:system-ui;background:#0b1220;color:#fff}
.wrap{max-width:900px;margin:auto;padding:20px}
.card{background:#0f1b33;border-radius:12px;overflow:hidden}
.chat{height:70vh;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.msg{padding:10px;border-radius:10px;max-width:80%}
.me{background:#2b6cff;align-self:flex-end}
.bot{background:#1d2a48}
.bar{display:flex;padding:10px;gap:10px}
input{flex:1;padding:10px}
button{padding:10px;cursor:pointer}
img.preview{max-width:200px;border-radius:10px;margin-top:5px}
</style>

</head>

<body>
<div class="wrap">
<div class="card">
<div id="chat" class="chat"></div>

<div class="bar">
<input id="text" placeholder="Digite..." />
<input id="fileInput" type="file" multiple accept="image/*,.pdf" hidden />
<button id="attachBtn">Anexar</button>
<button id="send">Enviar</button>
</div>
</div>
</div>

<script>
const API_BASE = "https://chatbot.pedro-fillype.workers.dev";

const $chat = document.getElementById("chat");
const $text = document.getElementById("text");
const $send = document.getElementById("send");
const $fileInput = document.getElementById("fileInput");
const $attachBtn = document.getElementById("attachBtn");

const ticket = {
  flow: "criacao_os",
  attachments: [],
  criacaoOS: { cdc:"", endereco:"", telefoneContato:"" }
};

/* =========================
   UI
========================= */
function addMsg(type, text){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  $chat.appendChild(div);
  $chat.scrollTop = $chat.scrollHeight;
}

function addImage(url){
  const div = document.createElement("div");
  div.className = "msg bot";

  const img = document.createElement("img");
  img.src = url;
  img.className = "preview";

  div.appendChild(img);
  $chat.appendChild(div);
  $chat.scrollTop = $chat.scrollHeight;
}

/* =========================
   UPLOAD
========================= */
async function handleSelectedFiles(files){
  const list = Array.from(files || []);
  if(!list.length) return;

  for(const file of list){

    addMsg("bot","📎 Enviando arquivo...");

    const form = new FormData();
    form.append("file", file);

    try{
      const resp = await fetch(API_BASE + "/upload", {
        method: "POST",
        body: form
      });

      let data;

      try {
        data = await resp.json();
      } catch {
        addMsg("bot","Erro: resposta inválida do servidor");
        continue;
      }

      console.log("RESPOSTA BACKEND:", data);

      // 🔥 valida retorno
      if (!data || !data.ok || !data.url) {
        addMsg("bot","❌ Erro no upload");
        if (data?.error) {
          addMsg("bot","Detalhe: " + data.error);
        }
        continue;
      }

      ticket.attachments.push({
        name: file.name,
        url: data.url
      });

      addMsg("me","📎 " + file.name);

      if(file.type.startsWith("image/")){
        addImage(data.url);
      } else {
        addMsg("bot","Arquivo enviado com sucesso");
      }

    } catch(e){
      console.error(e);
      addMsg("bot","❌ Erro de conexão com o servidor");
    }
  }

  $fileInput.value = "";
}

/* =========================
   VALIDAÇÃO
========================= */
async function validar(){
  const resp = await fetch(API_BASE + "/validar", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      tipo: ticket.flow,
      dados: ticket.criacaoOS
    })
  });

  const data = await resp.json();

  if(!data.ok){
    addMsg("bot","⚠️ Corrija:");
    data.erros.forEach(e => addMsg("bot","- " + e));
    return false;
  }

  addMsg("bot","✅ Tudo certo");
  return true;
}

/* =========================
   ENVIO
========================= */
async function send(){
  const txt = $text.value.trim();
  if(!txt) return;

  addMsg("me",txt);
  $text.value="";

  // exemplo
  ticket.criacaoOS.cdc = "123";
  ticket.criacaoOS.endereco = "Rua teste";
  ticket.criacaoOS.telefoneContato = "83999999999";

  const ok = await validar();
  if(!ok) return;

  addMsg("bot","📤 Enviado ao atendente");

  console.log("DADOS:", ticket);
}

/* =========================
   EVENTS
========================= */
$attachBtn.onclick = ()=> $fileInput.click();
$fileInput.onchange = (e)=> handleSelectedFiles(e.target.files);
$send.onclick = send;
$text.onkeydown = (e)=> e.key === "Enter" && send();

/* INIT */
addMsg("bot","Sistema pronto 🚀");
</script>

</body>
</html>
