<!doctype html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chatbot</title>

<style>
body{background:#0b1220;color:#fff;font-family:sans-serif;margin:0}
.wrap{max-width:900px;margin:auto;padding:20px}
.chat{height:70vh;overflow:auto;display:flex;flex-direction:column;gap:10px}
.msg{padding:10px;border-radius:10px;max-width:80%}
.me{background:#2b6cff;align-self:flex-end}
.bot{background:#1d2a48}
.menu button{display:block;margin:5px 0;padding:8px;border:none;background:#2b6cff;color:#fff;border-radius:8px;cursor:pointer}
.attachments{background:#111;border-radius:10px;padding:10px}
.attachment-item{display:flex;justify-content:space-between;align-items:center;margin:5px 0}
.remove-btn{background:red;border:none;color:#fff;padding:3px 8px;border-radius:5px;cursor:pointer}
img{max-width:200px;border-radius:10px}
.bar{display:flex;gap:10px;margin-top:10px}
input{flex:1;padding:10px}
button{padding:10px}
</style>

</head>

<body>
<div class="wrap">
<div id="chat" class="chat"></div>

<div class="bar">
<input id="text" placeholder="Digite..." autocomplete="off" />
<input id="fileInput" type="file" hidden multiple />
<button onclick="fileInput.click()">Anexar</button>
<button onclick="send()">Enviar</button>
</div>
</div>

<script>
const API = "https://chatbot.pedro-fillype.workers.dev";

const chat = document.getElementById("chat");
const fileInput = document.getElementById("fileInput");

const ticket = {
  flow:null,
  attachments:[],
  data:{}
};

/* ================= UI ================= */
function msg(type,text){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function img(url){
  const d=document.createElement("div");
  d.className="msg bot";
  const i=document.createElement("img");
  i.src=url;
  d.appendChild(i);
  chat.appendChild(d);
}

/* ================= MENU ================= */
function menu(){
  msg("bot","Escolha:");
  const box=document.createElement("div");
  box.className="menu";

  const b1=document.createElement("button");
  b1.innerText="Criar OS";
  b1.onclick=()=>{ticket.flow="os";msg("me","Criar OS");askOS();};

  const b2=document.createElement("button");
  b2.innerText="Abrir Chamado";
  b2.onclick=()=>{ticket.flow="chamado";msg("me","Abrir Chamado");askChamado();};

  box.appendChild(b1);
  box.appendChild(b2);
  chat.appendChild(box);
}

/* ================= FLUXO ================= */
function askOS(){
  msg("bot","Informe o CDC:");
  ticket.step="cdc";
}

function askChamado(){
  msg("bot","Informe matrícula:");
  ticket.step="matricula";
}

/* ================= INPUT ================= */
function send(){
  const input=document.getElementById("text");
  const value=input.value.trim();
  if(!value)return;

  msg("me",value);
  input.value="";

  if(ticket.step==="cdc"){
    ticket.data.cdc=value;
    ticket.step="endereco";
    msg("bot","Informe endereço:");
    return;
  }

  if(ticket.step==="endereco"){
    ticket.data.endereco=value;
    ticket.step="telefone";
    msg("bot","Telefone:");
    return;
  }

  if(ticket.step==="telefone"){
    ticket.data.telefone=value;
    finish();
    return;
  }

  if(ticket.step==="matricula"){
    ticket.data.matricula=value;
    finish();
    return;
  }
}

/* ================= UPLOAD ================= */
fileInput.onchange=async e=>{
  const files=Array.from(e.target.files);

  for(const file of files){

    msg("bot","Enviando...");

    const form=new FormData();
    form.append("file",file);

    const res=await fetch(API+"/upload",{method:"POST",body:form});
    const data=await res.json();

    if(!data.ok){
      msg("bot","Erro upload");
      continue;
    }

    ticket.attachments.push({
      name:file.name,
      url:data.url
    });

    msg("me","📎 "+file.name);

    if(file.type.startsWith("image/")){
      img(data.url);
    }

    renderAttachments();
  }
};

/* ================= LISTA ================= */
function renderAttachments(){
  const old=document.getElementById("attachments");
  if(old) old.remove();

  if(!ticket.attachments.length) return;

  const box=document.createElement("div");
  box.className="attachments";
  box.id="attachments";

  box.innerHTML="<b>Anexos:</b>";

  ticket.attachments.forEach((a,i)=>{
    const item=document.createElement("div");
    item.className="attachment-item";

    const name=document.createElement("span");
    name.innerText=a.name;

    const remove=document.createElement("button");
    remove.className="remove-btn";
    remove.innerText="X";
    remove.onclick=()=>{
      ticket.attachments.splice(i,1);
      renderAttachments();
    };

    item.appendChild(name);
    item.appendChild(remove);
    box.appendChild(item);
  });

  chat.appendChild(box);
}

/* ================= FINAL ================= */
function finish(){
  msg("bot","Resumo:");

  let resumo=JSON.stringify(ticket.data,null,2);

  if(ticket.attachments.length){
    resumo += "\nAnexos:\n" + ticket.attachments.map(a=>a.url).join("\n");
  }

  msg("bot",resumo);

  msg("bot","Enviado ao atendente ✔️");

  console.log("FINAL:",ticket);
}

/* INIT */
menu();
</script>

</body>
</html>
