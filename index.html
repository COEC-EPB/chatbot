<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chat - Usuário</title>
  <style>
    :root{
      --bg:#0b1220; --card:#0f1b33; --text:#e7eefc; --muted:#9bb0d3;
      --me:#2b6cff; --bot:#1d2a48; --agent:#19b37a; --border:#22345f;
      --danger:#ff4d4d;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,Segoe UI,Arial;background:linear-gradient(180deg,#070c16,#0b1220);color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:18px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .badge{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:999px;color:var(--muted)}
    .card{margin-top:14px;background:rgba(15,27,51,.85);border:1px solid var(--border);border-radius:16px;overflow:hidden}
    .chat{height:70vh;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .msg{max-width:78%;padding:10px 12px;border-radius:14px;line-height:1.25;border:1px solid transparent}
    .me{align-self:flex-end;background:rgba(43,108,255,.18);border-color:rgba(43,108,255,.35)}
    .bot{align-self:flex-start;background:rgba(29,42,72,.9);border-color:rgba(34,52,95,.9)}
    .agent{align-self:flex-start;background:rgba(25,179,122,.14);border-color:rgba(25,179,122,.35)}
    .meta{font-size:11px;color:var(--muted);margin-top:4px}
    .bar{display:flex;gap:10px;padding:12px;border-top:1px solid var(--border);background:rgba(10,16,30,.65)}
    input{flex:1;padding:12px 12px;border-radius:12px;border:1px solid var(--border);background:#0a142a;color:var(--text);outline:none}
    button{padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:#0c1a35;color:var(--text);cursor:pointer}
    button:hover{filter:brightness(1.08)}
    .danger{border-color:rgba(255,77,77,.35);background:rgba(255,77,77,.12)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .hint{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h2 style="margin:0 0 6px">Chat (Usuário)</h2>
        <div class="hint">Dica: abra também o <b>agent.html</b> em outra aba para simular o atendente.</div>
      </div>
      <div class="row">
        <span class="badge" id="statusBadge">Status: Chatbot</span>
        <span class="badge">Sessão: <span id="sid"></span></span>
      </div>
    </div>

    <div class="card">
      <div class="chat" id="chat"></div>
      <div class="bar">
        <input id="text" placeholder="Digite sua mensagem..." autocomplete="off" />
        <button id="send">Enviar</button>
      </div>
    </div>
  </div>

<script>
(() => {
  // --- Sessão simples (ID persistente por navegador) ---
  const sessionId = localStorage.getItem("demo_session_id")
    || (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2));
  localStorage.setItem("demo_session_id", sessionId);
  document.getElementById("sid").textContent = sessionId.slice(0, 8);

  // --- Canal entre abas ---
  const bc = new BroadcastChannel("support_chat_demo_v1");

  // --- Estado ---
  let mode = "bot"; // "bot" | "waiting" | "agent"
  let agentConnected = false;

  const $chat = document.getElementById("chat");
  const $text = document.getElementById("text");
  const $send = document.getElementById("send");
  const $badge = document.getElementById("statusBadge");

  function setBadge() {
    if (mode === "bot") $badge.textContent = "Status: Chatbot";
    if (mode === "waiting") $badge.textContent = "Status: Aguardando atendente…";
    if (mode === "agent") $badge.textContent = "Status: Em atendimento humano";
  }

  function addMsg(who, text) {
    const el = document.createElement("div");
    el.className = `msg ${who}`;
    el.innerHTML = `<div>${escapeHtml(text)}</div>
      <div class="meta">${who === "me" ? "Você" : who === "bot" ? "Chatbot" : "Atendente"}</div>`;
    $chat.appendChild(el);
    $chat.scrollTop = $chat.scrollHeight;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, (m) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  // --- Chatbot super simples (regras) ---
  function botReply(userText) {
    const t = userText.toLowerCase();

    // gatilhos para encaminhar
    const wantsHuman = ["atendente", "humano", "pessoa", "suporte", "ajuda", "urgente"].some(k => t.includes(k));

    if (wantsHuman) {
      mode = "waiting";
      setBadge();
      addMsg("bot", "Certo — vou te encaminhar para um atendente. Só um momento…");

      // avisa o atendente que tem alguém esperando
      bc.postMessage({
        type: "handoff_request",
        sessionId,
        preview: userText.slice(0, 140),
        ts: Date.now()
      });

      // ping para “acordar” atendente
      bc.postMessage({ type: "ping", sessionId, ts: Date.now() });

      return;
    }

    // respostas básicas
    if (t.includes("oi") || t.includes("olá") || t.includes("bom dia") || t.includes("boa tarde") || t.includes("boa noite")) {
      addMsg("bot", "Oi! Eu sou um bot simples 🙂 Me diga em poucas palavras o que você precisa. Se quiser falar com um humano, digite: atendente.");
      return;
    }

    if (t.includes("preço") || t.includes("valor")) {
      addMsg("bot", "Entendi! Você quer saber sobre preços/valores. Qual é o item/serviço específico?");
      return;
    }

    if (t.includes("problema") || t.includes("erro")) {
      addMsg("bot", "Poxa! Qual erro aparece (ou o que acontece)? Se puder, descreva o passo a passo.");
      return;
    }

    addMsg("bot", "Beleza. Me dá mais um detalhe? (Se quiser atendimento humano, digite: atendente.)");
  }

  // --- Envio de mensagem ---
  function send() {
    const txt = $text.value.trim();
    if (!txt) return;
    $text.value = "";
    addMsg("me", txt);

    if (mode === "bot") {
      botReply(txt);
      return;
    }

    // se está esperando e ainda não conectou, continua esperando
    if (mode === "waiting" && !agentConnected) {
      addMsg("bot", "Recebi sua mensagem. O atendente ainda não entrou — já já ele aparece.");
      // mantém mensagens em “fila” via canal
      bc.postMessage({ type:"user_message", sessionId, text: txt, ts: Date.now() });
      return;
    }

    // em atendimento humano
    bc.postMessage({ type:"user_message", sessionId, text: txt, ts: Date.now() });
  }

  $send.addEventListener("click", send);
  $text.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

  // --- Recebe mensagens do atendente ---
  bc.onmessage = (ev) => {
    const msg = ev.data || {};
    if (msg.sessionId && msg.sessionId !== sessionId) return;

    if (msg.type === "agent_joined") {
      agentConnected = true;
      mode = "agent";
      setBadge();
      addMsg("agent", "Olá! Sou o atendente. Pode me explicar o que você precisa?");
    }

    if (msg.type === "agent_message") {
      agentConnected = true;
      mode = "agent";
      setBadge();
      addMsg("agent", msg.text || "");
    }
  };

  // --- mensagem inicial ---
  addMsg("bot", "Olá! Eu sou um chatbot simples. Me diga o que você precisa. (Para falar com um humano, digite: atendente.)");
  setBadge();
})();
</script>
</body>
</html>
