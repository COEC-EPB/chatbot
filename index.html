<!doctype html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chatbot</title>

<style>
body{background:#0b1220;color:#fff;font-family:sans-serif;margin:0;display:flex;justify-content:center}
.wrap{width:100%;max-width:600px;height:100vh;display:flex;flex-direction:column}
.chat{flex:1;overflow:auto;padding:15px;display:flex;flex-direction:column;gap:10px}

.msg{padding:10px 14px;border-radius:12px;max-width:75%}
.me{background:#2b6cff;align-self:flex-end}
.bot{background:#1d2a48}

.menu button{
  display:block;margin:5px 0;padding:10px;border:none;
  background:#2b6cff;color:#fff;border-radius:8px;cursor:pointer;width:100%;
}

.bar{display:flex;gap:10px;padding:10px;border-top:1px solid #222}
input{flex:1;padding:12px;border-radius:10px;border:none}

button{padding:10px;border:none;border-radius:10px;background:#2b6cff;color:#fff}

.attachments{background:#111;padding:10px;border-radius:10px}
.attachment-item{display:flex;justify-content:space-between;margin:5px 0}
.remove-btn{background:red;color:#fff;border:none;border-radius:5px}

img{max-width:200px;border-radius:10px}
</style>

</head>

<body>
<div class="wrap">
<div id="chat" class="chat"></div>

<div class="bar">
<input id="text" placeholder="Digite..." />
<input id="fileInput" type="file" hidden multiple />
<button id="attachBtn">Anexar</button>
<button id="sendBtn">Enviar</button>
</div>
</div>

<script>
const API = "https://chatbot.pedro-fillype.workers.dev";

const chat = document.getElementById("chat");
const input = document.getElementById("text");
const fileInput = document.getElementById("fileInput");

let flowState=null;

const ticket={
  flow:null,
  attachments:[],
  criacaoOS:{},
  chamado:{}
};

/* UI */
function msg(type,text){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function img(url){
  const d=document.createElement("div");
  d.className="msg bot";
  const i=document.createElement("img");
  i.src=url;
  d.appendChild(i);
  chat.appendChild(d);
}

/* MENU */
function menu(){
  msg("bot","Escolha uma opção:");

  const box=document.createElement("div");
  box.className="menu";

  const b1=document.createElement("button");
  b1.innerText="📋 Criação de OS";
  b1.onclick=()=>startOS();

  const b2=document.createElement("button");
  b2.innerText="📞 Abertura de Chamado";
  b2.onclick=()=>startChamado();

  box.appendChild(b1);
  box.appendChild(b2);
  chat.appendChild(box);
}

/* OS */
function startOS(){
  ticket.flow="os";
  flowState="os_motivo";
  msg("me","Criação de OS");
  msg("bot","Qual o motivo da solicitação?");
}

/* CHAMADO */
function startChamado(){
  ticket.flow="chamado";
  flowState="matricula";
  msg("me","Abertura de Chamado");
  msg("bot","Informe a matrícula:");
}

/* INPUT */
function send(){
  const value=input.value.trim();
  if(!value) return;

  msg("me",value);
  input.value="";

  if(flowState==="matricula"){
    ticket.chamado.matricula=value;
    flowState="telefone";
    msg("bot","Telefone:");
    return;
  }

  if(flowState==="telefone"){
    ticket.chamado.telefone=value;
    flowState="tipoChamado";

    showMenu([
      ["reembolso","Reembolso"],
      ["senha","Reset Senha"],
      ["pda","PDA com problema"]
    ]);
    return;
  }

  if(flowState==="bolsa_valor"){
    ticket.chamado.valor=value;
    msg("bot","📎 Agora envie os documentos");
    flowState="upload";
    return;
  }

  if(flowState==="dep_nome"){
    ticket.chamado.nomeDependente=value;
    flowState="dep_valor";
    msg("bot","Valor do reembolso:");
    return;
  }

  if(flowState==="dep_valor"){
    ticket.chamado.valor=value;
    msg("bot","📎 Envie documentos");
    flowState="upload";
    return;
  }
}

/* MENU CLICK */
function showMenu(options){
  const box=document.createElement("div");
  box.className="menu";

  options.forEach(([val,label])=>{
    const b=document.createElement("button");
    b.innerText=label;
    b.onclick=()=>menuClick(val,label);
    box.appendChild(b);
  });

  chat.appendChild(box);
}

function menuClick(val,label){
  msg("me",label);

  if(val==="reembolso"){
    showMenu([
      ["baba","Auxílio Babá"],
      ["creche","Creche"],
      ["bolsa","Bolsa de Estudos"]
    ]);
    return;
  }

  if(val==="bolsa"){
    ticket.chamado.tipo="bolsa";
    flowState="bolsa_valor";
    msg("bot","Valor do reembolso:");
    return;
  }

  if(val==="baba" || val==="creche"){
    ticket.chamado.tipo=val;
    flowState="dep_nome";
    msg("bot","Nome do dependente:");
    return;
  }
}

/* UPLOAD */
fileInput.onchange=async e=>{
  const files=Array.from(e.target.files);

  for(const file of files){

    msg("bot","Enviando...");

    const form=new FormData();
    form.append("file",file);

    const res=await fetch(API+"/upload",{method:"POST",body:form});
    const data=await res.json();

    if(!data.ok){
      msg("bot","Erro upload");
      return;
    }

    ticket.attachments.push({
      name:file.name,
      url:data.url
    });

    msg("me","📎 "+file.name);

    if(file.type.startsWith("image/")){
      img(data.url);
    }

    renderAttachments();
  }

  if(flowState==="upload"){
    finish();
  }
};

/* LISTA */
function renderAttachments(){
  const old=document.getElementById("attachments");
  if(old) old.remove();

  const box=document.createElement("div");
  box.id="attachments";
  box.className="attachments";

  box.innerHTML="<b>Anexos:</b>";

  ticket.attachments.forEach((a,i)=>{
    const item=document.createElement("div");
    item.className="attachment-item";

    const name=document.createElement("span");
    name.innerText=a.name;

    const del=document.createElement("button");
    del.className="remove-btn";
    del.innerText="X";
    del.onclick=()=>{
      ticket.attachments.splice(i,1);
      renderAttachments();
    };

    item.appendChild(name);
    item.appendChild(del);
    box.appendChild(item);
  });

  chat.appendChild(box);
}

/* FINAL */
function finish(){
  msg("bot","Resumo:");

  let resumo=JSON.stringify(ticket,null,2);

  if(ticket.attachments.length){
    resumo+="\n\nAnexos:\n"+ticket.attachments.map(a=>a.url).join("\n");
  }

  msg("bot",resumo);
  msg("bot","Enviado ✔️");

  flowState=null;
}

/* EVENTS */
document.getElementById("attachBtn").onclick=()=>fileInput.click();
document.getElementById("sendBtn").onclick=send;

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

/* INIT */
menu();
input.focus();
</script>

</body>
</html>
