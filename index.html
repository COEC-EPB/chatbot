<!doctype html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chatbot</title>

<style>
body{
  background:#0b1220;
  font-family:sans-serif;
  margin:0;
  display:flex;
  justify-content:center;
}

.wrap{
  width:100%;
  max-width:600px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* 💬 bolhas */
.msg{
  padding:10px 14px;
  border-radius:12px;
  max-width:75%;
  animation:fadeIn .2s ease;
  word-break:break-word;
}

.me{
  background:#2b6cff;
  align-self:flex-end;
  border-bottom-right-radius:2px;
}

.bot{
  background:#1d2a48;
  align-self:flex-start;
  border-bottom-left-radius:2px;
}

/* 📎 anexos */
.attachments{
  background:#111;
  border-radius:10px;
  padding:10px;
}

.attachment-item{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.remove-btn{
  background:#ff4d4d;
  border:none;
  color:#fff;
  border-radius:5px;
  cursor:pointer;
}

/* 🔽 barra inferior fixa */
.bar{
  display:flex;
  gap:10px;
  padding:10px;
  background:#0b1220;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#2b6cff;
  color:#fff;
  cursor:pointer;
}

/* 🖼 imagens */
img{
  max-width:200px;
  border-radius:10px;
}

/* ✨ animação */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>
<div class="wrap">
<div id="chat" class="chat"></div>

<div class="bar">
<input id="text" placeholder="Digite..." autocomplete="off"/>
<input id="fileInput" type="file" hidden multiple/>
<button id="attachBtn">Anexar</button>
<button id="sendBtn">Enviar</button>
</div>
</div>

<!-- CÓDIGO REDUZIDO PARA FOCO NAS PARTES IMPORTANTES -->

<script>

let flowState = null;
const ticket = {
  flow:null,
  attachments:[],
  criacaoOS:{},
  chamado:{}
};

/* ================= MENU ================= */
function showMainMenu(){
  addMenu("Escolha uma opção:",[
    {value:"criacao_os",label:"1 - Criação de OS"},
    {value:"abertura_chamado",label:"2 - Abertura de Chamado"}
  ]);
}

/* ================= SELEÇÃO MENU ================= */
function handleMenu(value,label){
  addMsg("me",label);

  if(value==="criacao_os"){
    ticket.flow="criacao_os";
    flowState="criacao_os_motivo";
    addMsg("bot","Qual o motivo da solicitação?");
    return;
  }

  if(value==="abertura_chamado"){
    ticket.flow="chamado";
    flowState="chamado_matricula";
    addMsg("bot","Informe a matrícula:");
    return;
  }

  /* ================= CHAMADO ================= */

  if(value==="tipo_chamado:reembolso"){
    flowState="reembolso_tipo";
    addMenu("Qual tipo de reembolso?",[
      {value:"reembolso:baba",label:"Auxílio Babá"},
      {value:"reembolso:creche",label:"Creche/Educacional"},
      {value:"reembolso:bolsa",label:"Bolsa de Estudos"},
      {value:"reembolso:acidente",label:"Acidente de Trabalho"}
    ]);
    return;
  }

  if(value==="reembolso:baba"){
    ticket.chamado.tipo="baba";
    flowState="dep_nome";
    addMsg("bot","Nome do dependente:");
    return;
  }

  if(value==="reembolso:creche"){
    ticket.chamado.tipo="creche";
    flowState="dep_nome";
    addMsg("bot","Nome do dependente:");
    return;
  }

  if(value==="reembolso:bolsa"){
    ticket.chamado.tipo="bolsa";
    flowState="bolsa_valor";
    addMsg("bot","Qual o valor do reembolso?");
    return;
  }

  if(value==="reembolso:acidente"){
    ticket.chamado.tipo="acidente";
    flowState="acidente_valor";
    addMsg("bot","Qual o valor do reembolso?");
    return;
  }
}

/* ================= INPUT ================= */
function handleFlowInput(txt){

  /* ===== CHAMADO ===== */

  if(flowState==="chamado_matricula"){
    ticket.chamado.matricula=txt;
    flowState="chamado_tel";
    addMsg("bot","Telefone:");
    return;
  }

  if(flowState==="chamado_tel"){
    ticket.chamado.telefone=txt;
    flowState="tipo_chamado";
    addMenu("Qual chamado deseja?",[
      {value:"tipo_chamado:reembolso",label:"Reembolso"},
      {value:"tipo_chamado:senha",label:"Reset Senha"},
      {value:"tipo_chamado:pda",label:"PDA problema"}
    ]);
    return;
  }

  /* ===== DEPENDENTE ===== */

  if(flowState==="dep_nome"){
    ticket.chamado.nomeDependente=txt;
    flowState="dep_especial";
    addMenu("Dependente é especial?",[
      {value:"dep:sim",label:"SIM"},
      {value:"dep:nao",label:"NÃO"}
    ]);
    return;
  }

  if(flowState==="dep_data"){
    ticket.chamado.dataNascimento=txt;
    flowState="dep_valor";
    addMsg("bot","Valor do reembolso:");
    return;
  }

  if(flowState==="dep_valor"){
    ticket.chamado.valor=txt;
    addMsg("bot","Agora envie os documentos (anexos).");
    flowState="upload_docs";
    return;
  }

  /* ===== BOLSA ===== */

  if(flowState==="bolsa_valor"){
    ticket.chamado.valor=txt;
    flowState="bolsa_tipo";
    addMenu("Tipo do curso:",[
      {value:"curso:graduacao",label:"Graduação"},
      {value:"curso:pos",label:"Pós"},
      {value:"curso:tecnico",label:"Técnico"}
    ]);
    return;
  }

  if(flowState==="bolsa_tipo"){
    ticket.chamado.tipoCurso=txt;
    addMsg("bot","Envie os documentos.");
    flowState="upload_docs";
    return;
  }

  /* ===== FINAL ===== */
  if(flowState==="upload_docs"){
    finish();
    return;
  }
}

/* ================= UPLOAD ================= */
async function handleSelectedFiles(files){

  for(const file of files){

    addMsg("bot","Enviando...");

    const form=new FormData();
    form.append("file",file);

    const res=await fetch(API_BASE+"/upload",{method:"POST",body:form});
    const data=await res.json();

    if(!data.ok){
      addMsg("bot","Erro upload");
      return;
    }

    ticket.attachments.push({
      name:file.name,
      url:data.url
    });

    addMsg("me","📎 "+file.name);

    if(file.type.startsWith("image/")){
      addImage(data.url);
    }

    renderAttachments();
  }
}

/* ================= FINAL ================= */
function finish(){

  addMsg("bot","Resumo:");

  let resumo = JSON.stringify(ticket,null,2);

  if(ticket.attachments.length){
    resumo += "\n\nAnexos:\n" + ticket.attachments.map(a=>a.url).join("\n");
  }

  addMsg("bot",resumo);
  addMsg("bot","Enviado ao atendente ✔️");
}
showMainMenu()
</script>


</body>
</html>
