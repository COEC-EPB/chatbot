<!doctype html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chatbot</title>

<style>
body{
  background:#0b1220;
  font-family:sans-serif;
  margin:0;
  display:flex;
  justify-content:center;
}

.wrap{
  width:100%;
  max-width:600px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* 💬 bolhas */
.msg{
  padding:10px 14px;
  border-radius:12px;
  max-width:75%;
  animation:fadeIn .2s ease;
  word-break:break-word;
}

.me{
  background:#2b6cff;
  align-self:flex-end;
  border-bottom-right-radius:2px;
}

.bot{
  background:#1d2a48;
  align-self:flex-start;
  border-bottom-left-radius:2px;
}

/* 📎 anexos */
.attachments{
  background:#111;
  border-radius:10px;
  padding:10px;
}

.attachment-item{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.remove-btn{
  background:#ff4d4d;
  border:none;
  color:#fff;
  border-radius:5px;
  cursor:pointer;
}

/* 🔽 barra inferior fixa */
.bar{
  display:flex;
  gap:10px;
  padding:10px;
  background:#0b1220;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#2b6cff;
  color:#fff;
  cursor:pointer;
}

/* 🖼 imagens */
img{
  max-width:200px;
  border-radius:10px;
}

/* ✨ animação */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>
<div class="wrap">
<div id="chat" class="chat"></div>

<div class="bar">
<input id="text" placeholder="Digite..." autocomplete="off"/>
<input id="fileInput" type="file" hidden multiple/>
<button id="attachBtn">Anexar</button>
<button id="sendBtn">Enviar</button>
</div>
</div>

<script>
const API = "https://chatbot.pedro-fillype.workers.dev";

const chat = document.getElementById("chat");
const input = document.getElementById("text");
const fileInput = document.getElementById("fileInput");
const attachBtn = document.getElementById("attachBtn");
const sendBtn = document.getElementById("sendBtn");

const ticket = {
  flow:null,
  attachments:[],
  data:{},
  step:null
};

/* ================= UI ================= */
function msg(type,text){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;

  chat.appendChild(d);

  // scroll suave
  chat.scrollTo({
    top: chat.scrollHeight,
    behavior: "smooth"
  });
}

function img(url){
  const d=document.createElement("div");
  d.className="msg bot";
  const i=document.createElement("img");
  i.src=url;
  d.appendChild(i);
  chat.appendChild(d);
}

/* ================= MENU ================= */
function menu(){
  msg("bot","👋 Olá! Escolha uma opção:");

  const box=document.createElement("div");
  box.className="menu";

  const b1=document.createElement("button");
  b1.innerText="📋 Criar OS";
  b1.onclick=()=>{
    ticket.flow="os";
    msg("me","📋 Criar OS");
    ticket.step="cdc";
    msg("bot","Informe o CDC:");
  };

  const b2=document.createElement("button");
  b2.innerText="📞 Abrir Chamado";
  b2.onclick=()=>{
    ticket.flow="chamado";
    msg("me","📞 Abrir Chamado");
    ticket.step="matricula";
    msg("bot","Informe matrícula:");
  };

  box.appendChild(b1);
  box.appendChild(b2);
  chat.appendChild(box);
}

  function typing(){
  const d=document.createElement("div");
  d.className="msg bot";
  d.innerText="digitando...";
  chat.appendChild(d);

  setTimeout(()=>d.remove(),800);
}

/* ================= INPUT ================= */
function send(){
  const value=input.value.trim();
  if(!value){
    input.focus();
    return;
  }

  msg("me",value);
  input.value="";
  input.focus();

  if(ticket.step==="cdc"){
    ticket.data.cdc=value;
    ticket.step="endereco";
    msg("bot","Informe endereço:");
    return;
  }

  if(ticket.step==="endereco"){
    ticket.data.endereco=value;
    ticket.step="telefone";
    msg("bot","Telefone:");
    return;
  }

  if(ticket.step==="telefone"){
    ticket.data.telefone=value;
    finish();
    return;
  }

  if(ticket.step==="matricula"){
    ticket.data.matricula=value;
    finish();
    return;
  }
}

/* ================= UPLOAD ================= */
fileInput.onchange=async e=>{
  const files=Array.from(e.target.files);

  for(const file of files){

    msg("bot","📎 Enviando...");

    const form=new FormData();
    form.append("file",file);

    const res=await fetch(API+"/upload",{method:"POST",body:form});
    const data=await res.json();

    if(!data.ok){
      msg("bot","Erro upload");
      continue;
    }

    ticket.attachments.push({
      name:file.name,
      url:data.url
    });

    msg("me","📎 "+file.name);

    if(file.type.startsWith("image/")){
      img(data.url);
    }

    renderAttachments();
  }
};

/* ================= LISTA ================= */
function renderAttachments(){
  const old=document.getElementById("attachments");
  if(old) old.remove();

  if(!ticket.attachments.length) return;

  const box=document.createElement("div");
  box.className="attachments";
  box.id="attachments";

  box.innerHTML="<b>Anexos:</b>";

  ticket.attachments.forEach((a,i)=>{
    const item=document.createElement("div");
    item.className="attachment-item";

    const name=document.createElement("span");
    name.innerText=a.name;

    const remove=document.createElement("button");
    remove.className="remove-btn";
    remove.innerText="X";
    remove.onclick=()=>{
      ticket.attachments.splice(i,1);
      renderAttachments();
    };

    item.appendChild(name);
    item.appendChild(remove);
    box.appendChild(item);
  });

  chat.appendChild(box);
}

/* ================= FINAL ================= */
function finish(){
  msg("bot","Resumo:");

  let resumo=JSON.stringify(ticket.data,null,2);

  if(ticket.attachments.length){
    resumo += "\n\nAnexos:\n" + ticket.attachments.map(a=>a.url).join("\n");
  }

  msg("bot",resumo);
  msg("bot","Enviado ao atendente ✔️");

  console.log("FINAL:",ticket);

  ticket.step=null;
}

/* ================= EVENTS ================= */
attachBtn.onclick=()=>fileInput.click();
sendBtn.onclick=send;

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

// 🔥 CORREÇÃO DO INPUT
input.focus();

document.addEventListener("click",()=>{
  setTimeout(()=>input.focus(),100);
});
  menu();
</script>

</body>
</html>
