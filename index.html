<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chat - Usuário</title>
  <style>
    :root{
      --bg:#0b1220; --card:#0f1b33; --text:#e7eefc; --muted:#9bb0d3;
      --me:#2b6cff; --bot:#1d2a48; --agent:#19b37a; --border:#22345f;
      --warn:#ffb020; --danger:#ff4d4d; --ok:#19b37a;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,Segoe UI,Arial;background:linear-gradient(180deg,#070c16,#0b1220);color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:18px}
    .top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .badge{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:999px;color:var(--muted)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .card{margin-top:14px;background:rgba(15,27,51,.85);border:1px solid var(--border);border-radius:16px;overflow:hidden}
    .chat{height:70vh;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .msg{max-width:78%;padding:10px 12px;border-radius:14px;line-height:1.25;border:1px solid transparent}
    .me{align-self:flex-end;background:rgba(43,108,255,.18);border-color:rgba(43,108,255,.35)}
    .bot{align-self:flex-start;background:rgba(29,42,72,.9);border-color:rgba(34,52,95,.9)}
    .agent{align-self:flex-start;background:rgba(25,179,122,.14);border-color:rgba(25,179,122,.35)}
    .sys{align-self:center;background:rgba(255,176,32,.12);border-color:rgba(255,176,32,.25);max-width:92%}
    .meta{font-size:11px;color:var(--muted);margin-top:4px}
    .bar{display:flex;gap:10px;padding:12px;border-top:1px solid var(--border);background:rgba(10,16,30,.65)}
    input{flex:1;padding:12px 12px;border-radius:12px;border:1px solid var(--border);background:#0a142a;color:var(--text);outline:none}
    button{padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:#0c1a35;color:var(--text);cursor:pointer}
    button:hover{filter:brightness(1.08)}
    button:disabled, input:disabled{opacity:.6;cursor:not-allowed}
    .hint{font-size:12px;color:var(--muted)}
    .prio{font-size:12px;padding:4px 8px;border-radius:999px;border:1px solid var(--border);color:var(--muted)}
    .prio.low{border-color:rgba(25,179,122,.35);color:#a8f0d7;background:rgba(25,179,122,.10)}
    .prio.med{border-color:rgba(255,176,32,.35);color:#ffe2a6;background:rgba(255,176,32,.10)}
    .prio.high{border-color:rgba(255,77,77,.35);color:#ffb3b3;background:rgba(255,77,77,.10)}

    .menu-box{
      align-self:flex-start;
      max-width:90%;
      background:rgba(29,42,72,.9);
      border:1px solid rgba(34,52,95,.9);
      border-radius:14px;
      padding:12px;
    }
    .menu-title{
      font-size:14px;
      margin-bottom:10px;
      color:var(--text);
      font-weight:600;
    }
    .menu-buttons{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .menu-btn{
      width:100%;
      text-align:left;
      background:#13213f;
      border:1px solid #29406d;
      border-radius:12px;
      padding:10px 12px;
      color:var(--text);
      cursor:pointer;
      transition:.2s;
    }
    .menu-btn:hover{
      filter:brightness(1.08);
      transform:translateY(-1px);
    }
    .menu-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h2 style="margin:0 0 6px">Chat (Usuário)</h2>
        <div class="hint">O usuário pode entrar direto pelo login do Worker.</div>
      </div>
      <div class="row">
        <span class="badge" id="statusBadge">Status: Carregando…</span>
        <span class="badge">Sessão Chat: <span id="sid"></span></span>
        <span class="badge">Nome: <span id="uname">—</span></span>
        <span class="badge">Matrícula: <span id="umat">—</span></span>
        <span class="badge">Regional: <span id="ureg">—</span></span>
        <span class="prio low" id="prioPill" style="display:none"></span>
      </div>
    </div>

    <div class="card" id="loginCard" style="display:none; max-width:460px; margin:20px auto 0;">
      <div style="padding:18px;">
        <h3 style="margin-top:0;">Entrar</h3>
        <div class="hint" style="margin-bottom:12px;">Faça login para usar o chat.</div>

        <div style="display:flex; flex-direction:column; gap:10px;">
          <input id="loginMatricula" placeholder="Matrícula" />
          <input id="loginSenha" type="password" placeholder="Senha" />
          <button id="loginBtn">Entrar</button>
          <div id="loginMsg" class="hint"></div>
        </div>
      </div>
    </div>

    <div class="card" id="chatCard" style="display:none;">
      <div class="chat" id="chat"></div>
      <div class="bar">
        <input id="text" placeholder="Digite sua mensagem..." autocomplete="off" />
        <button id="send">Enviar</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const API_BASE = "https://long-hall-0aaa.pedro-fillype.workers.dev";

  const sessionId = localStorage.getItem("demo_session_id")
    || (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2));
  localStorage.setItem("demo_session_id", sessionId);
  document.getElementById("sid").textContent = sessionId.slice(0, 8);

  const bc = new BroadcastChannel("support_chat_demo_v2");

  const $chatCard = document.getElementById("chatCard");
  const $loginCard = document.getElementById("loginCard");
  const $loginMatricula = document.getElementById("loginMatricula");
  const $loginSenha = document.getElementById("loginSenha");
  const $loginBtn = document.getElementById("loginBtn");
  const $loginMsg = document.getElementById("loginMsg");

  const $chat = document.getElementById("chat");
  const $text = document.getElementById("text");
  const $send = document.getElementById("send");
  const $badge = document.getElementById("statusBadge");
  const $uname = document.getElementById("uname");
  const $umat = document.getElementById("umat");
  const $ureg = document.getElementById("ureg");
  const $prioPill = document.getElementById("prioPill");

  let mode = "loading";
  let agentConnected = false;
  let wizardStep = 0;
  let me = null;
  let activeMenuId = null;

  const ticket = {
    name: "",
    matricula: "",
    email: "",
    regional: "",
    topic: "",
    priority: "",
    description: "",
    createdAt: null,
  };

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, (m) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  function addMsg(kind, text) {
    const el = document.createElement("div");
    el.className = `msg ${kind}`;
    el.innerHTML = `<div>${escapeHtml(text)}</div><div class="meta">${labelOf(kind)}</div>`;
    $chat.appendChild(el);
    $chat.scrollTop = $chat.scrollHeight;
  }

  function addMenu(options) {
    const box = document.createElement("div");
    box.className = "menu-box";
    box.id = "menu-" + Date.now();

    const buttons = options.map(opt => `
      <button class="menu-btn" data-value="${escapeHtml(opt.value)}">
        ${escapeHtml(opt.label)}
      </button>
    `).join("");

    box.innerHTML = `
      <div class="menu-title">Escolha uma opção:</div>
      <div class="menu-buttons">${buttons}</div>
      <div class="meta">Chatbot</div>
    `;

    $chat.appendChild(box);
    $chat.scrollTop = $chat.scrollHeight;

    box.querySelectorAll(".menu-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const value = btn.getAttribute("data-value");
        disableMenu(box);
        handleMenuSelection(value);
      });
    });

    activeMenuId = box.id;
  }

  function disableMenu(menuEl) {
    menuEl.querySelectorAll(".menu-btn").forEach(btn => {
      btn.disabled = true;
    });
  }

  function labelOf(kind){
    if (kind === "me") return "Você";
    if (kind === "bot") return "Chatbot";
    if (kind === "agent") return "Atendente";
    return "Sistema";
  }

  function setBadge() {
    if (mode === "loading") $badge.textContent = "Status: Carregando…";
    if (mode === "login") $badge.textContent = "Status: Login necessário";
    if (mode === "bot") $badge.textContent = "Status: Chatbot";
    if (mode === "wizard") $badge.textContent = "Status: Coletando informações…";
    if (mode === "waiting") $badge.textContent = "Status: Aguardando atendente…";
    if (mode === "agent") $badge.textContent = "Status: Em atendimento humano";
  }

  function setUserUI() {
    $uname.textContent = ticket.name || "—";
    $umat.textContent = ticket.matricula || "—";
    $ureg.textContent = ticket.regional || "—";
  }

  function setPrioUI() {
    if (!ticket.priority) {
      $prioPill.style.display = "none";
      return;
    }
    $prioPill.style.display = "inline-block";
    $prioPill.className = `prio ${ticket.priority}`;
    $prioPill.textContent =
      ticket.priority === "low" ? "Prioridade: Baixa" :
      ticket.priority === "med" ? "Prioridade: Média" :
      "Prioridade: Alta";
  }

  function setInputEnabled(enabled) {
    $text.disabled = !enabled;
    $send.disabled = !enabled;
  }

  function showLogin() {
    $loginCard.style.display = "block";
    $chatCard.style.display = "none";
    mode = "login";
    setBadge();
    setInputEnabled(false);
  }

  function showChat() {
    $loginCard.style.display = "none";
    $chatCard.style.display = "block";
    setInputEnabled(true);
  }

  function normalizePriority(txt) {
    const t = txt.toLowerCase().trim();
    if (["alta","alto","high","h","3"].includes(t)) return "high";
    if (["media","média","med","m","2"].includes(t)) return "med";
    if (["baixa","baixo","low","l","1"].includes(t)) return "low";
    return "";
  }

  async function loadMe() {
    const resp = await fetch(`${API_BASE}/me`, {
      method: "GET",
      credentials: "include"
    });

    const data = await resp.json();

    if (!resp.ok || !data.ok || !data.user) {
      throw new Error(data?.error || "Não autenticado");
    }

    me = data.user;
    ticket.name = me.nome || "";
    ticket.matricula = me.matricula || "";
    ticket.email = me.email || "";
    ticket.regional = me.regional || "";

    setUserUI();
  }

  async function doLogin() {
    const matricula = $loginMatricula.value.trim();
    const senha = $loginSenha.value.trim();

    if (!matricula || !senha) {
      $loginMsg.textContent = "Informe matrícula e senha.";
      return;
    }

    $loginBtn.disabled = true;
    $loginMsg.textContent = "Entrando...";

    try {
      const resp = await fetch(`${API_BASE}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ matricula, senha })
      });

      const data = await resp.json();

      if (!resp.ok || !data.ok) {
        throw new Error(data?.error || "Falha no login");
      }

      await loadMe();

      showChat();
      mode = "bot";
      setBadge();
      addMsg("bot", `Olá, ${ticket.name || "usuário"}! Eu sou o chatbot de atendimento.`);
      addMsg("bot", "Escolha abaixo o tipo de solicitação:");
      showMainMenu();
      $loginMsg.textContent = "";
    } catch (err) {
      $loginMsg.textContent = err.message || "Não foi possível entrar.";
      showLogin();
    } finally {
      $loginBtn.disabled = false;
    }
  }

  function showMainMenu() {
    addMenu([
      { value: "criacao_os", label: "1 - Criação de OS" },
      { value: "alteracao_os", label: "2 - Alteração de OS" },
      { value: "abertura_chamado", label: "3 - Abertura de Chamados" }
    ]);
  }

  function handleMenuSelection(value) {
    if (value === "criacao_os") {
      ticket.topic = "Criação de OS";
      addMsg("me", "1 - Criação de OS");
      startWizardAfterTopic();
      return;
    }

    if (value === "alteracao_os") {
      ticket.topic = "Alteração de OS";
      addMsg("me", "2 - Alteração de OS");
      startWizardAfterTopic();
      return;
    }

    if (value === "abertura_chamado") {
      ticket.topic = "Abertura de Chamados";
      addMsg("me", "3 - Abertura de Chamados");
      startWizardAfterTopic();
      return;
    }
  }

  function startWizardAfterTopic() {
    mode = "wizard";
    wizardStep = 1;
    setBadge();
    addMsg("bot", `Perfeito. Você escolheu: ${ticket.topic}.`);
    addMsg("bot", "Agora informe a prioridade: baixa, média ou alta.");
  }

  function handleWizardInput(userText) {
    const txt = userText.trim();

    if (wizardStep === 1) {
      const p = normalizePriority(txt);
      if (!p) {
        addMsg("sys", "Escolha uma opção válida: baixa / média / alta.");
        return;
      }
      ticket.priority = p;
      setPrioUI();
      wizardStep = 2;
      addMsg("bot", "Descreva o que você precisa com mais detalhes.");
      return;
    }

    if (wizardStep === 2) {
      ticket.description = txt.slice(0, 1200);
      ticket.createdAt = Date.now();
      mode = "waiting";
      setBadge();

      addMsg("bot", "Obrigado! Vou te encaminhar para um atendente agora.");

      bc.postMessage({
        type: "handoff_request",
        sessionId,
        ticket: {
          name: ticket.name,
          matricula: ticket.matricula,
          email: ticket.email,
          regional: ticket.regional,
          topic: ticket.topic,
          priority: ticket.priority,
          description: ticket.description,
          createdAt: ticket.createdAt
        },
        ts: Date.now()
      });
    }
  }

  function botReply(userText) {
    const t = userText.toLowerCase();

    if (["menu", "inicio", "início", "voltar"].includes(t)) {
      addMsg("bot", "Tudo bem. Escolha novamente uma opção:");
      showMainMenu();
      return;
    }

    const wantsHuman = ["atendente", "humano", "pessoa", "suporte", "ajuda", "urgente"].some(k => t.includes(k));
    if (wantsHuman) {
      addMsg("bot", "Antes de te encaminhar, escolha o tipo de solicitação:");
      showMainMenu();
      return;
    }

    if (t.includes("oi") || t.includes("olá") || t.includes("bom dia") || t.includes("boa tarde") || t.includes("boa noite")) {
      addMsg("bot", `Oi, ${ticket.name || "usuário"}! Escolha uma opção abaixo para começarmos.`);
      showMainMenu();
      return;
    }

    addMsg("bot", "Para continuar, escolha uma opção do menu. Se quiser ver de novo, digite: menu.");
  }

  function send() {
    const txt = $text.value.trim();
    if (!txt || mode === "loading" || mode === "login") return;

    $text.value = "";
    addMsg("me", txt);

    if (mode === "wizard") {
      handleWizardInput(txt);
      return;
    }

    if (mode === "bot") {
      botReply(txt);
      return;
    }

    if (mode === "waiting" && !agentConnected) {
      addMsg("bot", "Recebi sua mensagem. O atendente ainda não entrou.");
      bc.postMessage({ type:"user_message", sessionId, text: txt, ts: Date.now() });
      return;
    }

    if (mode === "agent") {
      bc.postMessage({ type:"user_message", sessionId, text: txt, ts: Date.now() });
    }
  }

  $send.addEventListener("click", send);
  $text.addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
  });

  $loginBtn.addEventListener("click", doLogin);
  $loginSenha.addEventListener("keydown", (e) => {
    if (e.key === "Enter") doLogin();
  });

  bc.onmessage = (ev) => {
    const msg = ev.data || {};
    if (msg.sessionId && msg.sessionId !== sessionId) return;

    if (msg.type === "agent_joined") {
      agentConnected = true;
      mode = "agent";
      setBadge();
      addMsg("agent", "Olá! Sou o atendente. Já vi suas informações. Pode complementar algo se quiser.");
    }

    if (msg.type === "agent_message") {
      agentConnected = true;
      mode = "agent";
      setBadge();
      addMsg("agent", msg.text || "");
    }

    if (msg.type === "chat_ended") {
      agentConnected = false;
      mode = "bot";
      setBadge();
      ticket.topic = "";
      ticket.priority = "";
      ticket.description = "";
      ticket.createdAt = null;
      setPrioUI();
      addMsg("sys", "Atendimento encerrado pelo atendente.");
      addMsg("bot", "Se precisar de novo, escolha uma opção abaixo:");
      showMainMenu();
    }
  };

  async function boot() {
    setBadge();
    setUserUI();
    setPrioUI();
    setInputEnabled(false);

    try {
      await loadMe();
      showChat();
      mode = "bot";
      setBadge();
      addMsg("bot", `Olá, ${ticket.name || "usuário"}! Eu sou o chatbot de atendimento.`);
      addMsg("bot", "Escolha abaixo o tipo de solicitação:");
      showMainMenu();
    } catch {
      showLogin();
    }
  }

  boot();
})();
</script>
</body>
</html>
